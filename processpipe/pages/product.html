<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details</title>
  <link rel="stylesheet" href="../style.css" />

  <style>
    /* ================================
       PRESSURE PARALLAX SECTION
    ================================ */
    .pressure-parallax { margin: 40px 0; }

    .pp-wrap {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 24px;
      align-items: start;
    }

    .pp-media {
      position: relative;
      height: 60vh;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      background: #0b0f14;
    }

    .pp-media img {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      object-fit: cover;
      transform: scale(1.05);
      transition: transform 0.1s ease-out;
      will-change: transform;
    }

    .pp-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
      display: flex;
      align-items: flex-end;
      padding: 16px;
      color: #fff;
    }

    .pp-overlay-badge {
      background: rgba(255,255,255,0.12);
      padding: 12px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }

    .pp-kicker {
      display: block;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .9;
      margin-bottom: 6px;
    }

    .pp-title { display:block; font-weight: 800; font-size: 18px; }
    .pp-meta  { display:block; font-size: 13px; opacity: .9; margin-top: 4px; }

    .pp-details {
      position: sticky;
      top: 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pp-h { margin: 0; font-size: 22px; }
    .pp-sub { margin: 0; opacity: .75; }

    .pp-glass {
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.30);
      backdrop-filter: blur(10px);
    }

    .pp-status { font-size: 13px; opacity: .85; margin-bottom: 10px; }

    /* SANS 62 value cards */
    .pp-specgrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .pp-spec {
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .pp-label { font-size: 12px; opacity: .75; margin-bottom: 6px; }
    .pp-value { font-size: 22px; font-weight: 800; letter-spacing: .01em; }

    @media (min-width: 900px) {
      .pp-specgrid { grid-template-columns: 1fr 1fr; }
    }

    /* SANS 719 kv rows */
    .pp-kv { display: grid; gap: 8px; margin-bottom: 12px; }

    .pp-kv-row {
      display:flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* SANS 719 table */
    .pp-table-wrap {
      max-height: 340px;
      overflow: auto;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.65);
    }

    .pp-table table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .pp-table th, .pp-table td {
      padding: 10px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      white-space: nowrap;
      text-align: left;
    }

    .pp-table th {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      z-index: 1;
    }

    .pp-cta {
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      border: 1px solid #ddd;
      font-weight: 600;
      background: #fafafa;
      display: inline-block;
    }

    @media (max-width: 900px) {
      .pp-wrap { grid-template-columns: 1fr; }
      .pp-details { position: static; }
      .pp-media { height: 40vh; }
    }
  </style>
</head>

<body>
  <main class="container" style="padding:20px;">
    <a href="../index.html" style="display:inline-block;margin-bottom:12px;">← Back to search</a>

    <div id="product-detail">
      <p>Loading product...</p>
    </div>
  </main>

  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // Normalize product sizes like "NB 200", "DN200", "200mm", etc.
    function normalizeSize(raw) {
      return String(raw ?? "")
        .toLowerCase()
        .replaceAll("nominalbore", "")
        .replaceAll("nominaldiameter", "")
        .replaceAll("nb", "")
        .replaceAll("dn", "")
        .replaceAll("mm", "")
        .replaceAll(/\s+/g, "")
        .trim();
    }
function extractFirstNumber(raw) {
  const m = String(raw ?? "").match(/(\d+(\.\d+)?)/);
  return m ? m[1] : String(raw ?? "");
}
    const PRESSURE_CONFIG = {
      "SANS 62": {
        json: "../data/pressure/sans-62-pressure.json",
        image: "/images/Sans62-6.png",
        type: "sans62"
      },
      "SANS 719": {
        json: "../data/pressure/sans-719-pressure.json",
        image: "/images/Sans719.png",
        type: "sans719"
      }
    };

    function normalizeStandard(s) {
      return String(s || "").toUpperCase().replace(/\s+/g, " ").trim();
    }

    function getPressureConfig(standard) {
      const s = normalizeStandard(standard);
      if (s.includes("SANS 62")) return PRESSURE_CONFIG["SANS 62"];
      if (s.includes("SANS 719")) return PRESSURE_CONFIG["SANS 719"];
      return null;
    }

    function makeImmersivePressureHTML(standardText, sizeText) {
      const cfg = getPressureConfig(standardText);
      if (!cfg) return "";

      return `
        <section class="pressure-parallax" id="pressure-parallax" data-standard="${escapeHtml(standardText)}">
          <div class="pp-wrap">
            <div class="pp-media">
              <img id="pp-img" src="${cfg.image}" alt="${escapeHtml(standardText)} Pressure Table" />
              <div class="pp-overlay">
                <div class="pp-overlay-badge">
                  <span class="pp-kicker">Pressure Table</span>
                  <span class="pp-title">${escapeHtml(standardText)}</span>
                  <span class="pp-meta">Size: ${escapeHtml(sizeText || "N/A")}</span>
                </div>
              </div>
            </div>

            <aside class="pp-details">
              <h3 class="pp-h">Pressure values</h3>

              <div class="pp-glass">
                <div id="pp-status" class="pp-status">Loading…</div>
                <div id="pp-table" class="pp-table"></div>
              </div>

              <a class="pp-cta" id="pp-open-img" href="${cfg.image}" target="_blank" rel="noopener">Open full image</a>
            </aside>
          </div>
        </section>
      `;
    }

  function renderSANS62(rows, productSizeRaw, status, mount) {
  const wantedNum = extractFirstNumber(productSizeRaw);

  const row = rows.find(r => {
    const rowSize =
      r.size ??
      r.nb ??
      r.dn ??
      r["nominal bore"] ??
      r["nominal diameter"] ??
      r.nominal_bore ??
      r.nominal_bore_mm ??
      r.dn_mm;

    return extractFirstNumber(rowSize) === wantedNum;
  }) || null;

  if (!row) {
    // show what sizes exist (helps instantly)
    const examples = rows
      .slice(0, 12)
      .map(r => r.size ?? r.nb ?? r.dn ?? r["nominal bore"] ?? r["nominal diameter"] ?? r.nominal_bore ?? r.nominal_bore_mm)
      .filter(Boolean)
      .join(", ");

    status.textContent = `No SANS 62 pressure values for size ${productSizeRaw} (matched as ${wantedNum}). Example sizes in JSON: ${examples}`;
    mount.innerHTML = "";
    return;
  }

  status.textContent = `SANS 62 values for size ${wantedNum}`;

  mount.innerHTML = `
    <div class="pp-specgrid">
      <div class="pp-spec">
        <div class="pp-label">Water Service (Medium)</div>
        <div class="pp-value">${escapeHtml(row.water_service_medium ?? row.waterServiceMedium ?? "—")}</div>
      </div>
      <div class="pp-spec">
        <div class="pp-label">Water Service (Heavy)</div>
        <div class="pp-value">${escapeHtml(row.water_service_heavy ?? row.waterServiceHeavy ?? "—")}</div>
      </div>
      <div class="pp-spec">
        <div class="pp-label">Steam / Air / Gas (Medium)</div>
        <div class="pp-value">${escapeHtml(row.steam_air_gas_medium ?? row.steamAirGasMedium ?? "—")}</div>
      </div>
      <div class="pp-spec">
        <div class="pp-label">Steam / Air / Gas (Heavy)</div>
        <div class="pp-value">${escapeHtml(row.steam_air_gas_heavy ?? row.steamAirGasHeavy ?? "—")}</div>
      </div>
    </div>
  `;
}
    function renderSANS719(data, productSizeRaw, status, mount) {
  const wantedNum = extractFirstNumber(productSizeRaw);

  const rows = Array.isArray(data?.rows) ? data.rows : (Array.isArray(data) ? data : []);
  if (!rows.length) {
    status.textContent = "SANS 719 data has no rows.";
    mount.innerHTML = "";
    return;
  }

  const row = rows.find(r => extractFirstNumber(r.nominal_bore_mm) === wantedNum) || null;

  if (!row) {
    status.textContent = `No SANS 719 values for size ${productSizeRaw} (matched as ${wantedNum}).`;
    mount.innerHTML = "";
    return;
  }

  status.textContent = `SANS 719 test pressures for NB ${escapeHtml(row.nominal_bore_mm)} mm`;

  const pressures = Array.isArray(row.pressures) ? row.pressures : [];

  mount.innerHTML = `
    <div class="pp-kv">
      <div class="pp-kv-row"><span>Nominal Bore</span><strong>${escapeHtml(row.nominal_bore_mm)} mm</strong></div>
      <div class="pp-kv-row"><span>Outside Diameter</span><strong>${escapeHtml(row.outside_diameter_mm)} mm</strong></div>
    </div>

    <div class="pp-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Wall thickness (mm)</th>
            <th>Test pressure (kPa)</th>
          </tr>
        </thead>
        <tbody>
          ${pressures.map(p => `
            <tr>
              <td>${escapeHtml(p.thickness_mm)}</td>
              <td>${escapeHtml(p.pressure_kpa)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

 async function renderPressureTable(productStandard, productSizeRaw) {
  const cfg = getPressureConfig(productStandard);
  const status = document.getElementById("pp-status");
  const mount = document.getElementById("pp-table");
  if (!status || !mount) return;

  if (!cfg) {
    status.textContent = `No pressure table configured for standard: ${productStandard}`;
    mount.innerHTML = "";
    return;
  }

  try {
    status.textContent = `Loading pressure data from ${cfg.json}…`;

    const res = await fetch(cfg.json);
    if (!res.ok) throw new Error(`Pressure JSON not found: ${res.status} ${res.statusText}`);

    const data = await res.json();

    // ✅ Helper: find first array inside an object
    const firstArrayInObject = (obj) => {
      if (!obj || typeof obj !== "object") return null;
      for (const k of Object.keys(obj)) {
        if (Array.isArray(obj[k])) return obj[k];
      }
      return null;
    };

    // ✅ Build rows depending on standard type
    if (cfg.type === "sans62") {
      let rows = [];

      if (Array.isArray(data)) {
        rows = data;
      } else if (Array.isArray(data?.rows)) {
        rows = data.rows;
      } else {
        // ✅ If it's a "map keyed by size", convert to array
        // Example: { "6": {..}, "8": {..} }
        const keys = Object.keys(data || {});
        const looksLikeSizeMap = keys.length && keys.every(k => /^\d+(\.\d+)?$/.test(String(k)));

        if (looksLikeSizeMap) {
          rows = keys.map(k => ({ size: k, ...(data[k] || {}) }));
        } else {
          // ✅ If it’s wrapped under some other array key like "values"
          const arr = firstArrayInObject(data);
          if (arr) rows = arr;
        }
      }

      if (!rows.length) {
        status.textContent = `Pressure JSON loaded, but has no usable rows. (${cfg.json})`;
        mount.innerHTML = "";
        return;
      }

      return renderSANS62(rows, productSizeRaw, status, mount);
    }

    // ✅ SANS 719 (already uses rows)
    if (cfg.type === "sans719") {
      const rows =
        Array.isArray(data?.rows) ? data.rows :
        Array.isArray(data) ? data :
        firstArrayInObject(data) || [];

      if (!rows.length) {
        status.textContent = `Pressure JSON loaded, but has no usable rows. (${cfg.json})`;
        mount.innerHTML = "";
        return;
      }

      return renderSANS719({ rows }, productSizeRaw, status, mount);
    }

    status.textContent = "Unknown pressure table type.";
    mount.innerHTML = "";
  } catch (err) {
    console.error(err);
    status.textContent = `Failed to load pressure data: ${err.message}`;
    mount.innerHTML = "";
  }
}

    async function loadProduct() {
      const id = getQueryParam("id");
      const container = document.getElementById("product-detail");

      if (!id) {
        container.innerHTML = "<p>Missing product id.</p>";
        return;
      }

      try {
        // ✅ IMPORTANT: keep this page SANS-only so pressure tables never break
       const raw = await fetch("../data/search-index.json").then((r) => r.json());

// Flatten catalogue: handles flat items, nested .items, and raw nested arrays
const products = raw.flatMap(p => {
  if (Array.isArray(p)) return p;
  if (p && Array.isArray(p.items)) return p.items;
  return p;
});

const product = products.find(p => String(p.id) === String(id));

        if (!product) {
          container.innerHTML = "<p>Product not found.</p>";
          return;
        }

        const size =
          product.size ||
          product["nominal bore"] ||
          product["nominal diameter"] ||
          "N/A";

        const od =
          product["outside diameter"] ||
          product.outside_diameter ||
          "N/A";

        const rows = Object.entries(product)
          .filter(([k]) => k !== "keywords")
          .map(([k, v]) => `
            <tr>
              <td style="padding:8px;border:1px solid #ddd;"><strong>${escapeHtml(k)}</strong></td>
              <td style="padding:8px;border:1px solid #ddd;">${escapeHtml(v)}</td>
            </tr>
          `).join("");
          // 🔧 HARD-CODED IMAGE RULES (fast & reliable)
const desc = String(product.description || "").toLowerCase();
const std = String(product.standard || "").toUpperCase();

let imageHTML = "";

if (std.includes("B16.9")) {
  if (desc.includes("90") && desc.includes("short")) {
    imageHTML = `<img src="../images/90short.png" alt="90° Elbow Short Radius"
      style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
  } else if (desc.includes("90")) {
    imageHTML = `<img src="../images/90Elbow.png" alt="90° Elbow Long Radius"
      style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
  } else if (desc.includes("45")) {
    imageHTML = `<img src="../images/45elbow.png" alt="45° Elbow"
      style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
  }else
  if (std.includes("B16.9") && desc.includes("tee")) {
  imageHTML = `<img src="../images/eqaltee.png" alt="Equal Tee"
    style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
}else
if (std.includes("B16.9") && desc.includes("reducing tee")) {
  imageHTML = `<img src="../images/reducingtee.png" alt="Reducing Tee"
    style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
}else
if (std.includes("B16.9") && desc.includes("concentric tee")) {
  imageHTML = `<img src="../images/concentrictee.jpeg" alt="Reducing Tee"
    style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
}else
if (std.includes("B16.9") && desc.includes("eccentric reducer")) {
  imageHTML = `<img src="../images/eccentricreducer.webp" alt="Reducing Tee"
    style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;}
// ✅ Reducers (NEW)
else if (std.includes("B16.9") && desc.includes("reducer")) {
  imageHTML = `<img src="../images/reducer.jpg" alt="Reducer"
    style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
}else if (std.includes("B16.9") && desc.includes("cap")) {
  imageHTML = `<img src="../images/caps.png" alt="End Cap"
    style="max-width:360px;width:100%;height:auto;border-radius:14px;margin:16px 0;display:block;">`;
}
}

        container.innerHTML = `
          <h1>${escapeHtml(product.standard)} — ${escapeHtml(product.description)}</h1>
          <p><strong>Size:</strong> ${escapeHtml(size)} &nbsp; | &nbsp; <strong>OD:</strong> ${escapeHtml(od)}</p>

          ${imageHTML}

${makeImmersivePressureHTML(product.standard, size)}

          <h3>Details</h3>
          <table style="width:100%;border-collapse:collapse;">
            <tbody>${rows}</tbody>
          </table>
        `;

        // ✅ Pressure tables will work again
        const pressureSize = extractFirstNumber(size);
renderPressureTable(product.standard, pressureSize);

      } catch (err) {
        console.error(err);
        container.innerHTML = "<p>Failed to load product data.</p>";
      }
    }

    loadProduct();

    // Parallax (smooth, rAF)
    (() => {
      let raf = null;

      function tick() {
        const img = document.getElementById("pp-img");
        const section = document.getElementById("pressure-parallax");
        if (!img || !section) return;

        const rect = section.getBoundingClientRect();
        const vh = window.innerHeight || document.documentElement.clientHeight;

        const raw = (vh - rect.top) / (vh + rect.height);
        const t = Math.max(0, Math.min(1, raw));

        const y = (t - 0.5) * 50;
        const s = 1.06 + t * 0.02;
        img.style.transform = `translateY(${y}px) scale(${s})`;
      }

      function onScroll() {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          tick();
          raf = null;
        });
      }

      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", onScroll);
      document.addEventListener("DOMContentLoaded", tick);
      tick();
    })();
  </script>
</body>
</html>
